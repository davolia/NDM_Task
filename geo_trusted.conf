# Trusted proxies — only nginx containers on the internal network.
# Any request from outside this subnet is treated as an untrusted user.
geo $is_trusted_proxy {
    default         0;
    172.20.0.1      1;   # nginx1
    172.20.0.2      1;   # nginx2
    172.20.0.3      1;   # nginx3
}

# If request came from a trusted proxy  → append $remote_addr to existing XFF.
# If request came from an untrusted user → start a fresh XFF with only $remote_addr,
#   effectively stripping any X-Forwarded-For the user injected.
map $is_trusted_proxy $xff_value {
    1       "$http_x_forwarded_for, $remote_addr";
    default "$remote_addr";
}

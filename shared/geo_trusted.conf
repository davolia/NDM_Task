# mark internal proxy IPs as trusted; everything else is treated as the client
geo $is_trusted_proxy {
    default      0;
    172.20.0.11  1;
    172.20.0.12  1;
    172.20.0.13  1;
}

# trusted source: append to existing XFF
# untrusted source: start fresh (drops any XFF the client sent)
map $is_trusted_proxy $xff_value {
    1       "$http_x_forwarded_for, $remote_addr";
    default "$remote_addr";
}
